controller_manager:
  ros__parameters:
    update_rate: 30
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

left_arm_6dof_controller:
  ros__parameters:
    type: forward_command_controller/ForwardCommandController
    joints: 
      - left_shoulder_1_joint
      - left_shoulder_2_joint
      - left_elbow_joint
      - left_wrist_1_joint
      - left_wrist_2_joint
      - left_wrist_3_joint
      - left_gripper_joint
      - left_gripper_prismatic_joint_2
    interface_name: position
    
right_arm_6dof_controller:
  ros__parameters:
    type: forward_command_controller/ForwardCommandController
    joints: 
      - right_shoulder_1_joint
      - right_shoulder_2_joint
      - right_elbow_joint
      - right_wrist_1_joint
      - right_wrist_2_joint
      - right_wrist_3_joint
      - right_gripper_joint
      - right_gripper_prismatic_joint_2
    interface_name: position

left_arm_5dof_controller:
  ros__parameters:
    type: forward_command_controller/ForwardCommandController
    joints: 
      - left_shoulder_1_joint
      - left_shoulder_2_joint
      - left_elbow_joint
      - left_wrist_1_joint
      - left_wrist_2_joint
      - left_gripper_joint
      - left_gripper_prismatic_joint_2
    interface_name: position
    
right_arm_5dof_controller:
  ros__parameters:
    type: forward_command_controller/ForwardCommandController
    joints: 
      - right_shoulder_1_joint
      - right_shoulder_2_joint
      - right_elbow_joint
      - right_wrist_1_joint
      - right_wrist_2_joint
      - right_gripper_joint
      - right_gripper_prismatic_joint_2
    interface_name: position

head_controller:
  ros__parameters:
    type: forward_command_controller/ForwardCommandController
    joints: 
      - pan_joint
      - tilt_joint
    interface_name: position
